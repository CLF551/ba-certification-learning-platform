<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<title>W01 · cert | Learn Smarter</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, 'Segoe UI', sans-serif;
    background: #fbf3e0;
    color: #4a403a;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .frame {
    width: 100%;
    max-width: 420px;
    background: #fdf9f0;
    border-radius: 28px;
    padding: 8px;
    box-shadow: 0 0 0 1px #d4b89680, 0 12px 40px -8px rgba(74,64,58,0.12);
  }

  .frame.wide {
    max-width: 860px;
  }

  .screen {
    background: #fdf9f0;
    border-radius: 22px;
    padding: 40px 28px 32px;
    min-height: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
  }

  /* ── wireframe annotation ── */
  .wf-label {
    position: absolute;
    top: 14px; left: 20px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.5px;
    color: #d4b896;
  }
  .wf-label span { color: #c1666b; }

  .wf-dims {
    position: absolute;
    bottom: 10px;
    font-size: 10px;
    color: #d4b896;
    letter-spacing: 0.3px;
  }

  /* ── brand ── */
  .brand {
    text-align: center;
    margin-bottom: 32px;
    padding-top: 8px;
  }

  .brand h1 {
    font-size: 30px;
    font-weight: 700;
    color: #4a403a;
    letter-spacing: -0.8px;
  }

  .brand .tagline {
    font-size: 14px;
    font-weight: 400;
    color: #a0907a;
    margin-top: 2px;
    margin-bottom: 16px;
  }

  .golden-line {
    width: 120px;
    height: 3px;
    margin: 0 auto;
    border-radius: 4px;
    background: linear-gradient(90deg, #d4b896 0%, #f4a900 50%, #d4b896 100%);
    box-shadow: 0 0 8px rgba(244,169,0,0.25);
  }

  /* ── cert cards ── */
  .cert-grid {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 16px;
    flex: 1;
  }

  .cert-card {
    background: #fcf8ee;
    border: 1.5px solid #e8dcc8;
    border-radius: 16px;
    padding: 28px 24px 24px;
    text-align: center;
    position: relative;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .cert-card.active {
    border-color: #f4a900;
    background: linear-gradient(135deg, #fdf9f0 0%, #fcf3dc 100%);
    box-shadow: 0 4px 20px rgba(244,169,0,0.12);
  }

  .cert-card .badge {
    display: inline-block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 3px 12px;
    border-radius: 20px;
    margin-bottom: 12px;
    background: #e8dcc8;
    color: #7a6a54;
  }

  .cert-card.active .badge {
    background: #f4a900;
    color: #fff;
  }

  .cert-card h2 {
    font-size: 18px;
    font-weight: 600;
    color: #4a403a;
    line-height: 1.3;
    margin-bottom: 2px;
  }

  .cert-card .code {
    font-size: 13px;
    font-weight: 500;
    color: #a0907a;
    margin-bottom: 18px;
  }

  .btn {
    display: inline-block;
    padding: 11px 36px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    font-family: inherit;
    border: none;
    background: #f4a900;
    color: #fff;
    letter-spacing: 0.3px;
    transition: background 0.2s, transform 0.15s;
  }

  .btn:hover {
    background: #d49200;
  }

  .cert-card.disabled {
    opacity: 0.5;
  }

  .cert-card.disabled .badge {
    background: #e8dcc8;
    color: #a0907a;
  }

  .coming-note {
    font-size: 13px;
    color: #b8a88a;
    margin-top: 6px;
  }

  /* ── footer ── */
  .footer-note {
    margin-top: 28px;
    font-size: 12px;
    font-weight: 400;
    color: #c8b89a;
    letter-spacing: 0.2px;
  }

  /* ── responsive wide ── */
  @media (min-width: 768px) {
    .frame.wide .screen { padding: 44px 36px 36px; }
    .frame.wide .cert-grid {
      flex-direction: row;
      gap: 20px;
    }
    .frame.wide .cert-card {
      flex: 1;
      padding: 32px 24px 28px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    .frame.wide .brand h1 { font-size: 34px; }
  }
</style>
</head>
<body>

<div class="frame wide">
  <div class="screen">
    <div class="wf-label">W01 <span>·</span> Certification Selection</div>

    <div class="brand">
      <h1>Learn Smarter</h1>
      <p class="tagline">AI-powered certification coaching</p>
      <div class="golden-line"></div>
    </div>

    <div class="cert-grid">
      <div class="cert-card active">
        <div class="badge">Available</div>
        <h2>Microsoft Azure<br>AI Fundamentals</h2>
        <p class="code">AI-901</p>
        <button class="btn" disabled style="pointer-events:none;">Start Learning</button>
      </div>

      <div class="cert-card disabled">
        <div class="badge">Coming Soon</div>
        <h2>More Certifications</h2>
        <p class="code">Expanding library</p>
        <p class="coming-note">Stay tuned for updates</p>
      </div>
    </div>

    <p class="footer-note">Built on official syllabus</p>
    <p class="wf-dims">mobile · 375 × 667 &nbsp;·&nbsp; desktop · 840 × 520</p>
  </div>
</div>

</body>
</html>
